<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8" />
    <title>Level Edit</title>
    <script src="//cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>
    <style type="text/css">
        body {
            margin: 0;
        }
    </style>
</head>
<body>
<script type="text/javascript">
    let playerText;
    let breakPlatText;
    let bluePlatText;
    let mushText;
    let moldText;
    let goalText;
    let leverText;

    let playerPos = {
        x: 0,
        y: 0,
    }

    let platPos = {
        x1: 0,
        y1: 0,
        x2: 0,
        y2: 0,
        x3: 0,
        y3: 0,
    }

    let breakPlatPos = {
        x1: 0,
        y1: 0,
    }

    let colorPlatPos = {
        blueX1: 0,
        blueY1: 0,
    }

    let mushPos = {
        x: 0,
        y: 0,
    }

    let moldPos = {
        y: 0,
        x1: 0,
        x2: 0,
        x3: 0,
        x4: 0,
        x5: 0,
    }

    let goalPos = {
        x: 0,
        y: 0,
    }

    let leverPos = {
        x: 0,
        y: 0,
    }

    var config = {
        type: Phaser.AUTO,
        // factor of 216 for resolution 16 by 9 ratio
        width: 3456,
        height: 1944,
        backgroundColor: '0x120c06',
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 550 },
                debug: false
            }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    var game = new Phaser.Game(config);

    function preload ()
    {
        this.load.image('projRef', 'projectionRef.jpg')
        this.load.image('sky', 'assets/sky.png');
        this.load.image('ground', 'assets/platform.png');
        this.load.image('breakPlat', 'assets/breakPlat.png');
        this.load.image('colorPlat', 'assets/colorPlat.png');
        this.load.image('mushroom', 'assets/mushroom.png');
        this.load.image('mold', 'assets/mold.png');
        this.load.image('moldEdge', 'assets/moldEdge.png');
        this.load.spritesheet('bunny',
            'assets/bunny.png',
            { frameWidth: 40, frameHeight: 32 }
        );
        this.load.image('goal', 'assets/goal.png');
        this.load.spritesheet('lever', 'assets/lever.png',
            {frameWidth: 96, frameHeight: 96}
        );
        this.load.spritesheet('leverIcon', '/assets/leverIcons.png',
            {frameWidth: 32, frameHeight: 32}
        );
    }

    function create ()
    {
        sky = this.add.image(config.width / 2, config.height / 2, 'sky').setDisplaySize(936, 487);

        //player
        player = this.add.sprite(500, 500, 'bunny');
        player.setInteractive();
        this.input.setDraggable(player);

        // goal
        goal = this.add.sprite(400, 300, 'goal');
        goal.setInteractive();
        this.input.setDraggable(goal);

        //mushroom spring
        mushroom = this.add.sprite(400, 350, 'mushroom');
        mushroom.setInteractive();
        this.input.setDraggable(mushroom);

        // platforms
        platforms = this.add.sprite(400, 400, 'ground');
        platforms.setInteractive();
        this.input.setDraggable(platforms);

        // breakaway platforms created
        breakPlat = this.add.sprite(400, 450, 'breakPlat');
        breakPlat.setInteractive();
        this.input.setDraggable(breakPlat);

        // color platforms
        bluePlatform = this.add.sprite(400, 500, 'colorPlat').setTint(0x0062ff);
        bluePlatform.setInteractive();
        this.input.setDraggable(bluePlatform);

        // mold
        mold = this.add.sprite(400, 550, 'moldEdge');
        mold.setInteractive();
        this.input.setDraggable(mold);

        // lever
        lever = this.add.sprite(200, 325, 'lever');
        lever.setInteractive();
        this.input.setDraggable(lever);
        lever.setDepth(1);
        leverIconL = this.add.sprite(300, 300, 'leverIcon');
        leverIconL.setInteractive();
        this.input.setDraggable(leverIconL);
        leverIconL.setFrame(0);
        leverIconL.setDepth(2);
        leverIconR = this.add.sprite(300, 350, 'leverIcon');
        leverIconR.setInteractive();
        this.input.setDraggable(leverIconR);
        leverIconR.setFrame(0);
        leverIconR.setDepth(2);
        
        // DRAGGING
        this.input.on('drag', function (pointer, gameObject, dragX, dragY){
            gameObject.x = dragX;
            gameObject.y = dragY;
        })

        // TEXT
        playerText = this.add.text(1255, 500, 'Player: ' + player.x + ',' + player.y, {fontSize: '24px', fill: '#ffffff'})
        breakPlatText = this.add.text(1255, 450, 'Breakaway Platform: ' + breakPlat.x + ',' + breakPlat.y, {fontSize: '24px', fill: '#ffffff'})
        bluePlatText = this.add.text(1255, 400, 'Blue Platform: ' + bluePlatform.x + ',' + bluePlatform.y, {fontSize: '24px', fill: '#ffffff'})
        mushText = this.add.text(1255, 350, 'Mushroom: ' + mushroom.x + ',' + mushroom.y, {fontSize: '24px', fill: '#ffffff'})
        moldText = this.add.text(1255, 300, 'Mold: ' + mold.x + ',' + mold.y, {fontSize: '24px', fill: '#ffffff'})
        goalText = this.add.text(1255, 250, 'Goal: ' + goal.x + ',' + goal.y, {fontSize: '24px', fill: '#ffffff'})
        leverText = this.add.text(1255, 200, 'Lever: ' + lever.x + ',' + lever.y, {fontSize: '24px', fill: '#ffffff'})
    }

    function update ()
    {
        playerText.setText('Player: ' + (player.x - sky.x) + ',' + (player.y - sky.y));
        breakPlatText.setText('Breakaway Platform: ' + (breakPlat.x - sky.x) + ',' + (breakPlat.y - sky.y));
        bluePlatText.setText('Blue Platform: ' + (bluePlatform.x - sky.x) + ',' + (bluePlatform.y - sky.y));
        mushText.setText('Mushroom: ' + (mushroom.x - sky.x) + ',' + (mushroom.y - sky.y));
        moldText.setText('Mold: ' + (mold.x - sky.x) + ',' + (mold.y - sky.y));
        goalText.setText('Goal: ' + (goal.x - sky.x) + ',' + (goal.y - sky.y));
        leverText.setText('Lever: ' + (lever.x - sky.x) + ',' + (lever.y - sky.y));
    }

</script>
</body>
</html>
