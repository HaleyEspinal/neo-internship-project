<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8" />
    <title>Dust Bunny Adventures</title>
    <script src="//cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>
    <style type="text/css">
        body {
            margin: 0;
        }
    </style>
</head>
<body>

<script type="text/javascript">
    var gameOver = false;
    let cJump = true;
    let airTime = 0;
    let level = 1;
    let levelText;
    let cursorText;
    let safeSpotX;
    let safeSpotY;
    let moldChainA = 3;
    let rightMold;
    let breakPlat1Touched;
    let onBreakPlat;
    let blueCollider;
    let leverInt = false;
    let leverDir = 'right';
    let leverTypeL = 0;
    let leverTypeR = 0;
    let doubleJumpAv = false;
    let doubleJumpStop = true;
    let sky;

    // this is an object, not an array
    // example of call: platPosition.x1
    let extRules = {
        doubleJump: false,
        colorBlue: false,
        lowGav: false,
    }

    let playerPos = {
        x: 0,
        y: 0,
    }

    let platPos = {
        x1: 0,
        y1: 0,
        x2: 0,
        y2: 0,
        x3: 0,
        y3: 0,
    }

    let breakPlatPos = {
        x1: 0,
        y1: 0,
    }

    let colorPlatPos = {
        blueX1: 0,
        blueY1: 0,
    }

    let mushPos = {
        x: 0,
        y: 0,
    }

    let moldPos = {
        y: 0,
        x1: 0,
        x2: 0,
        x3: 0,
        x4: 0,
        x5: 0,
    }

    let goalPos = {
        x: 0,
        y: 0,
    }

    let leverPos = {
        x: 0,
        y: 0,
    }

    var config = {
        type: Phaser.AUTO,
        // factor of 216 for resolution 16 by 9 ratio
        width: 3456,
        height: 1944,
        backgroundColor: '0x120c06',
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 550 },
                debug: false
            }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    var game = new Phaser.Game(config);

    function preload ()
    {
        this.load.image('projRef', 'projectionRef.jpg')
        this.load.image('sky', 'assets/sky.png');
        this.load.image('ground', 'assets/platform.png');
        this.load.image('breakPlat', 'assets/breakPlat.png');
        this.load.image('colorPlat', 'assets/colorPlat.png');
        this.load.image('mushroom', 'assets/mushroom.png');
        this.load.image('mold', 'assets/mold.png');
        this.load.image('moldEdge', 'assets/moldEdge.png');
        this.load.spritesheet('bunny',
            'assets/bunny.png',
            { frameWidth: 40, frameHeight: 32 }
        );
        this.load.image('goal', 'assets/goal.png');
        this.load.spritesheet('lever', 'assets/lever.png',
            {frameWidth: 96, frameHeight: 96}
        );
        this.load.spritesheet('leverIcon', '/assets/leverIcons.png',
            {frameWidth: 32, frameHeight: 32}
        );
    }

    function create ()
    {
        //scale to match resolution ratio
        // this.add.image(0, 0, 'projRef').setOrigin(0,0).setScale(2.16); 
        sky = this.add.image(2018, 1532, 'sky').setDisplaySize(936, 487);
        // sky.setTint('0xffffff').setAlpha(0.5);

        // goal
        goal = this.physics.add.staticSprite(0, 0, 'goal');

        //mushroom spring
        mushroom = this.physics.add.staticSprite(0, 0, 'mushroom');

        // platforms
        platforms = this.physics.add.staticGroup();

        // breakaway platforms created
        breakPlat1 = this.physics.add.staticSprite(0, 0, 'breakPlat');

        // color platforms
        bluePlatforms = this.physics.add.staticGroup();

        // mold
        mold = this.physics.add.staticGroup();

        // lever
        lever = this.physics.add.staticSprite(0, 0, 'lever');
        lever.setDepth(1);
        leverIconL = this.physics.add.staticSprite(0, 0, 'leverIcon');
        leverIconL.setFrame(0);
        leverIconL.setDepth(2);
        leverIconR = this.physics.add.staticSprite(0, 0, 'leverIcon');
        leverIconR.setFrame(0);
        leverIconR.setDepth(2);


        player = this.physics.add.sprite(1700, 1700, 'bunny');
        player.setBounce(0.15);
        player.setCollideWorldBounds(true);
        player.setDepth(5);

        this.anims.create({
            key: 'left',
            frames: this.anims.generateFrameNumbers('bunny', { start: 0, end: 3 }),
            frameRate: 10,
            repeat: -1
        });

        this.anims.create({
            key: 'front',
            frames: [ { key: 'bunny', frame: 4 } ],
            frameRate: 20
        });

        this.anims.create({
            key: 'right',
            frames: this.anims.generateFrameNumbers('bunny', { start: 5, end: 8 }),
            frameRate: 10,
            repeat: -1
        });

        // collision and overlaps
        this.physics.add.collider(player, platforms);
        this.physics.add.collider(player, breakPlat1, breakPlat1Check, null, this);
        blueCollider = this.physics.add.collider(player, bluePlatforms);
        this.physics.add.overlap(player, goal, goalReached, null, this);
        this.physics.add.collider(player, mushroom, springUp, null, this);
        this.physics.add.overlap(player, mold, moldTouch, null, this);

        // keyboard inputs
        cursors = this.input.keyboard.createCursorKeys();
        zeroKey = this.input.keyboard.addKey('ZERO');
        enterKey = this.input.keyboard.addKey('ENTER');

        // text
        testText = this.add.text(16, 20, 'Blue: ', {fontSize: '32px', fill: '#ffffff'})
        levelText = this.add.text(16, 50, 'Level: 1', {fontSize: '32px', fill: '#ffffff'})
        cursorText = this.add.text(16, 80, 'Mouse: ', {fontSize: '32px', fill: '#ffffff'})
        

        levelSetup();
        leverFlipped();
    }

    function breakPlat1Check(){
        breakPlat1Touched = true;
        onBreakPlat = true;
    }

    function leverFlipped(){
        // changes all extRules to false. "key" could be any word
        for (let key in extRules){
            extRules[key] = false;
        }
       
        // if leverDir === left ?, then use leverIconL, else: use leverIconR
        switch(leverDir === 'left' ? leverTypeL : leverTypeR){
            case 0:
                extRules.doubleJump = true;
                break;
            case 1:
                extRules.colorBlue = true;
                break;
        }
        colorPlatCheck();
       }

    function goalReached(){
        platforms.clear(true, true);
        mold.clear(true, true);
        bluePlatforms.clear(true, true);
        level += 1;
        levelText.setText ('Level: ' + level);
        levelSetup();
        safeSpotX = player.x;
        safeSpotY = player.y;

        // re-enables the breakaway platform, 0 0 is ignored because of first parameter
        breakPlat1.enableBody(false, 0, 0, true, true);
    }

    function levelSetup(){
        // checks level for position
        switch(level){
            case 1:
                playerPos.x = -300;
                playerPos.y = 180;
                platPos.x1 = 270;
                platPos.y1 = 103;
                platPos.x2 = 200;
                platPos.y2 = -60;
                platPos.x3 = -390;
                platPos.y3 = 9;
                breakPlatPos.x1 = -162;
                breakPlatPos.y1 = 1;
                colorPlatPos.blueX1 = -320;
                colorPlatPos.blueY1 = 120;
                goalPos.x = -350;
                goalPos.y = -100;
                mushPos.x = -100;
                mushPos.y = 190;
                moldPos.x1 = 150;
                moldPos.y = 87;
                moldChainA = 5;
                leverPos.x = -530;
                leverPos.y = -20;
                leverTypeL = 0;
                leverTypeR = 1;
                break;
            case 2:
                playerPos.x = 0;
                playerPos.y = 180;
                platPos.x1 = -300;
                platPos.y1 = 100;
                platPos.x2 = 300;
                platPos.y2 = 100;
                platPos.x3 = 0;
                platPos.y3 = -100;
                breakPlatPos.x1 = 400;
                breakPlatPos.y1 = 20;
                colorPlatPos.blueX1 = 300;
                colorPlatPos.blueY1 = -50;
                goalPos.x = 0;
                goalPos.y = -190;
                mushPos.x = -220;
                mushPos.y = 70;
                moldPos.x1 = -170;
                moldPos.y = -115;
                moldChainA = 3;
                leverPos.x = 520;
                leverPos.y = 70;
                leverTypeL = 0;
                leverTypeR = 1;
                break;
            case 3:

                break;
        }
        // move player
        player.setPosition(sky.x + playerPos.x, sky.y + playerPos.y);

        // goal
        goal.setPosition(sky.x + goalPos.x, sky.y + goalPos.y, 'goal');

        // mushroom spring
        mushroom.setPosition(sky.x + mushPos.x, sky.y + mushPos.y, 'mushroom');

        // main ground
        platforms.create(sky.x, (sky.y + sky.displayHeight/2 - 20), 'ground').setDisplaySize(936, 40).refreshBody();

        // other platforms
        platforms.create(sky.x + platPos.x1, sky.y + platPos.y1, 'ground');
        platforms.create(sky.x + platPos.x2, sky.y + platPos.y2, 'ground');
        platforms.create(sky.x + platPos.x3, sky.y + platPos.y3, 'ground');

        // breakaway platforms
        breakPlat1.setPosition(sky.x + breakPlatPos.x1, sky.y + breakPlatPos.y1, 'breakPlat');

        // color platforms
        colorPlatCheck();

        // mold
        let moldAtexture3 = 'mold';
        let moldAtexture4 = 'mold';
        let moldAtexture5 = 'mold';

        moldPos.x2 = (moldPos.x1 + 24);
        moldPos.x3 = (moldPos.x2 + 24);
        moldPos.x4 = (moldPos.x3 + 24);
        moldPos.x5 = (moldPos.x4 + 24);

        if (moldChainA <= 3){
            moldAtexture3 = 'moldEdge';
        } else {
            moldAtexture3 = 'mold';
        }
        if (moldChainA === 4){
            moldAtexture4 = 'moldEdge';
        } else {
            moldAtexture4 = 'mold';
        }
        if (moldChainA >= 5){
            moldAtexture5 = 'moldEdge';
        } else {
            moldAtexture5 = 'mold';
        }
        mold.create(sky.x + moldPos.x1, sky.y + moldPos.y, 'moldEdge').setFlipX(true);
        mold.create(sky.x + moldPos.x2, sky.y + moldPos.y, 'mold');
        mold.create(sky.x + moldPos.x3, sky.y + moldPos.y, moldAtexture3);
        rightMold = moldPos.x3;
        if (moldChainA >= 4){
        mold.create(sky.x + moldPos.x4, sky.y + moldPos.y, moldAtexture4);
        rightMold = moldPos.x4;
        }
        if (moldChainA >= 5){
        mold.create(sky.x + moldPos.x5, sky.y + moldPos.y, moldAtexture5);
        rightMold = moldPos.x5;
        }

        //EXTERNAL
        lever.setPosition(sky.x + leverPos.x, sky.y + leverPos.y, 'lever');
        leverIconL.setPosition(sky.x + leverPos.x-29, sky.y + leverPos.y+31, 'leverIcon');
        leverIconL.setFrame(leverTypeL);
        leverIconR.setPosition(sky.x + leverPos.x+29, sky.y + leverPos.y+31, 'leverIcon');
        leverIconR.setFrame(leverTypeR);

        // refresh collison hitboxes
        breakPlat1.refreshBody();
        mushroom.refreshBody();
        goal.refreshBody();
    }

    function colorPlatCheck(){
        bluePlatforms.clear(true, true);
        if (extRules.colorBlue === true){
            blueCollider.active = true;
            bluePlatforms.create(sky.x + colorPlatPos.blueX1, sky.y + colorPlatPos.blueY1, 'colorPlat').setTint(0x0062ff);
        } else {
            blueCollider.active = false;
            bluePlatforms.create(sky.x + colorPlatPos.blueX1, sky.y + colorPlatPos.blueY1, 'colorPlat').setTint(0x6ea6ff);
        }
    }

    function springUp(){
        if (player.body.touching.down && mushroom.body.touching.up){
            player.setVelocityY(-600);
            cJump = false;
        }
    }

    function moldTouch(){
        player.x = safeSpotX;
        player.y = (safeSpotY-5);
        player.setVelocityY(0);
    }

    function update(){
        if (cursors.left.isDown){
            player.setVelocityX(-160);
            player.anims.play('left', true);
        }
        else if (cursors.right.isDown){
            player.setVelocityX(160);
            player.anims.play('right', true);
        }
        else{
            player.setVelocityX(0);
            player.anims.play('front', true);
        }

        // SAFESPOT
        // safespot only taken if player is far enough from mold edge
        if (player.body.touching.down && ((player.x <= (moldPos.x1 - 12 - 50)) || (player.x >= (rightMold + 12 + 50))) && !breakPlat1Touched){
            safeSpotX = player.x;
            safeSpotY = player.y;
        }
     
        // JUMP
        if (cursors.up.isDown && (player.body.touching.down || cJump === true)){
            player.setVelocityY(-400);
            cJump = false;
        }

        if (extRules.doubleJump && cursors.up.isUp && !player.body.touching.down){
            doubleJumpAv = true;
        }

        // DOUBLE JUMP
        if (cursors.up.isDown && !player.body.touching.down && doubleJumpAv && !doubleJumpStop){
            player.setVelocityY(-400);
            cJump = false;
            doubleJumpAv = false;
            doubleJumpStop = true;
        }

        // coyote jump. If player is NOT touching down
        if (!player.body.touching.down){
            // coyote jump timer
            // "=>" go to these commands
            this.time.delayedCall(100, () => {
                cJump = false;
            })
        }

        if (player.body.touching.down){
            cJump = true;
            doubleJumpAv = false;
            doubleJumpStop = false;
        }

        // BREAKAWAY PLATFORMS
        // -30 accounts for bounce
        if (!onBreakPlat && breakPlat1Touched && 
        (player.y <= (breakPlat1.y - breakPlat1.height/2 - 30) || 
        player.y >= (breakPlat1.x + breakPlat1.width/2) ||
        player.x >= (breakPlat1.x + breakPlat1.width/2) || 
        player.x <= (breakPlat1.x - breakPlat1.width/2)
        )
        ){
            breakPlat1.disableBody(true,true);
            breakPlat1Touched = false;
        }
        onBreakPlat = false;

        // LEVER PROXIMITY
        if (player.x <= (lever.x+lever.width/2 + 10) &&
            player.x >= (lever.x-lever.width/2 - 10) &&
            player.y <= (lever.y+lever.height/2) &&
            player.y >= (lever.y-lever.height/2 - 20)
            ){
                leverInt = true;
            }
            else{
                lever.clearTint();
                leverInt = false;
            }

        if (leverInt === true){
            lever.setTint('0xffe799');
        }

        if (leverInt === true && Phaser.Input.Keyboard.JustDown(enterKey)){
            if (leverDir === 'right'){
                lever.setFrame(1);
                leverDir = 'left';
            }
            else if (leverDir === 'left'){
                lever.setFrame(0);
                leverDir = 'right';
            }
            leverFlipped();
        }


        // TESTS
        if (Phaser.Input.Keyboard.JustDown(zeroKey)){
            extRules.colorBlue = !extRules.colorBlue;
            colorPlatCheck();
        }

        testText.setText ('Blue: ' + extRules.colorBlue);
        cursorText.setText ('Mouse: ' + this.input.activePointer.x + ', ' + this.input.activePointer.y);

        console.log('extRules.doubleJump', extRules.doubleJump, doubleJumpAv);
    }
    


</script>

</body>
</html>
