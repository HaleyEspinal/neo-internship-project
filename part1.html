<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8" />
    <title>Dust Bunny Adventures</title>
    <script src="//cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>
    <style type="text/css">
        body {
            margin: 0;
        }
    </style>
</head>
<body>

<script type="text/javascript">
    var gameOver = false;
    let cJump = true;
    let airTime = 0;
    let level = 1;
    let levelText;

    // this is an object, not an array
    // example of call: platPosition.x1
    let platPos = {
        x1: 0,
        y1: 0,
        x2: 0,
        y2: 0,
        x3: 0,
        y3: 0,
    }

    let mushPos = {
        x: 0,
        y: 0,
    }

    let moldPos = {
        x1: 0,
        y1: 0,
    }

    let goalPos = {
        x: 0,
        y: 0,
    }

    var config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 550 },
                debug: false
            }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    var game = new Phaser.Game(config);

    function preload ()
    {
        this.load.image('sky', 'assets/sky.png');
        this.load.image('ground', 'assets/platform.png');
        this.load.image('mushroom', 'assets/mushroom.png');
        this.load.image('mold', 'assets/mold.png');
        this.load.image('moldEdge', 'assets/moldEdge.png');
        this.load.spritesheet('dude',
            'assets/dude.png',
            { frameWidth: 32, frameHeight: 48 }
        );
        this.load.image('goal', 'assets/goal.png');
    }

    function create ()
    {
        
        this.add.image(400, 300, 'sky');


        // goal
        goal = this.physics.add.staticSprite(0, 0, 'goal');

        //mushroom spring
        mushroom = this.physics.add.staticSprite(0, 0, 'mushroom');

        // platforms
        platforms = this.physics.add.staticGroup();

        // mold
        mold = this.physics.add.staticGroup();

        levelSetup();

        player = this.physics.add.sprite(100, 300, 'dude');
        player.setBounce(0.15);
        player.setCollideWorldBounds(true);

        this.anims.create({
            key: 'left',
            frames: this.anims.generateFrameNumbers('dude', { start: 0, end: 3 }),
            frameRate: 10,
            repeat: -1
        });

        this.anims.create({
            key: 'turn',
            frames: [ { key: 'dude', frame: 4 } ],
            frameRate: 20
        });

        this.anims.create({
            key: 'right',
            frames: this.anims.generateFrameNumbers('dude', { start: 5, end: 8 }),
            frameRate: 10,
            repeat: -1
        });


        // collision and overlaps
        this.physics.add.collider(player, platforms);
        this.physics.add.overlap(player, goal, goalReached, null, this);
        this.physics.add.collider(player, mushroom, springUp, null, this);

        cursors = this.input.keyboard.createCursorKeys();

        // text
        levelText = this.add.text(16, 48, 'Level: 1', {fontSize: '32px', fill: '#000'})
    }

    function goalReached(){
        // runs once per child
       platforms.children.iterate(function(platform){
        // 1st statment: collision, 2nd statement: visual
        platform.disableBody(true, true);
       });
        level += 1;
        levelText.setText ('Level: ' + level);
        levelSetup();
        player.setPosition(300, 400);
    }

    function levelSetup(){
        // checks level for position
        switch(level){
            case 1:
                platPos.x1 = 600;
                platPos.y1 = 400;
                platPos.x2 = 50;
                platPos.y2 = 250;
                platPos.x3 = 750;
                platPos.y3 = 220;
                goalPos.x = 100;
                goalPos.y = 200;
                mushPos.x = 330;
                mushPos.y = 525;
                moldPos.x = 50;
                moldPos.y = 200;
                break;
            case 2:
                platPos.x1 = 0;
                platPos.y1 = 475;
                platPos.x2 = 300;
                platPos.y2 = 200;
                platPos.x3 = 550;
                platPos.y3 = 350;
                goalPos.x = 325;
                goalPos.y = 50;
                break;
            case 3:

                break;
        }
        // goal
        goal.setPosition(goalPos.x, goalPos.y, 'goal');

        // mushroom spring
        mushroom.setPosition(mushPos.x, mushPos.y, 'mushroom');

        // main ground
        platforms.create(400, 568, 'ground').setScale(2).refreshBody();

        // other platforms
        platforms.create(platPos.x1, platPos.y1, 'ground');
        platforms.create(platPos.x2, platPos.y2, 'ground');
        platforms.create(platPos.x3, platPos.y3, 'ground');

        // mold
        mold.create(moldPos.x1, moldPos.y1, 'mold');

        // refresh collison hitboxes
        mushroom.refreshBody();
        goal.refreshBody();
    }

    function springUp(){
        if (player.body.touching.down && mushroom.body.touching.up){
            player.setVelocityY(-600);
            cJump = false;
        }
    }

    function update(){
        if (cursors.left.isDown){
            player.setVelocityX(-160);
            player.anims.play('left', true);
        }
        else if (cursors.right.isDown){
            player.setVelocityX(160);
            player.anims.play('right', true);
        }
        else{
            player.setVelocityX(0);
            player.anims.play('turn', true);
        }
        // JUMP
        if (cursors.up.isDown && (player.body.touching.down || cJump === true)){
            player.setVelocityY(-400);
            cJump = false;
        }

        // coyote jump. If player is NOT touching down
        if (!player.body.touching.down){
            // coyote jump timer
            // "=>" go to these commands
            this.time.delayedCall(50, () => {
                cJump = false;
            })
        }

        if (player.body.touching.down){
            cJump = true;
        }
    }
    


</script>

</body>
</html>
