<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8" />
    <title>Dust Bunny Adventures</title>
    <script src="//cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>
    <style type="text/css">
        body {
            margin: 0;
        }
    </style>
</head>
<body>

<script type="text/javascript">
    var gameOver = false;
    let cJump = true;
    let airTime = 0;
    let level = 1;
    let levelText;
    let safeSpotX;
    let safeSpotY;
    let moldChainA = 3;
    let rightMold;
    let breakPlat1Touched;
    let onBreakPlat;

    // this is an object, not an array
    // example of call: platPosition.x1
    let platPos = {
        x1: 0,
        y1: 0,
        x2: 0,
        y2: 0,
        x3: 0,
        y3: 0,
    }

    let breakPlatPos = {
        x1: 0,
        y1: 0,
    }

    let colorPlatPos = {
        blueX1: 0,
        blueY1: 0,
    }

    let mushPos = {
        x: 0,
        y: 0,
    }

    let moldPos = {
        y: 0,
        x1: 0,
        x2: 0,
        x3: 0,
        x4: 0,
        x5: 0,
    }

    let goalPos = {
        x: 0,
        y: 0,
    }

    var config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 550 },
                debug: false
            }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    var game = new Phaser.Game(config);

    function preload ()
    {
        this.load.image('sky', 'assets/sky.png');
        this.load.image('ground', 'assets/platform.png');
        this.load.image('breakPlat', 'assets/breakPlat.png');
        this.load.image('colorPlat', 'assets/colorPlat.png');
        this.load.image('mushroom', 'assets/mushroom.png');
        this.load.image('mold', 'assets/mold.png');
        this.load.image('moldEdge', 'assets/moldEdge.png');
        this.load.spritesheet('dude',
            'assets/dude.png',
            { frameWidth: 32, frameHeight: 48 }
        );
        this.load.image('goal', 'assets/goal.png');
    }

    function create ()
    {
        
        this.add.image(400, 300, 'sky');


        // goal
        goal = this.physics.add.staticSprite(0, 0, 'goal');

        //mushroom spring
        mushroom = this.physics.add.staticSprite(0, 0, 'mushroom');

        // platforms
        platforms = this.physics.add.staticGroup();

        // breakaway platforms
        breakPlat1 = this.physics.add.staticSprite(0, 0, 'breakPlat');

        // color platforms
        bluePlatforms = this.physics.add.staticGroup();

        // mold
        mold = this.physics.add.staticGroup();

        levelSetup();

        player = this.physics.add.sprite(100, 300, 'dude');
        player.setBounce(0.15);
        player.setCollideWorldBounds(true);

        this.anims.create({
            key: 'left',
            frames: this.anims.generateFrameNumbers('dude', { start: 0, end: 3 }),
            frameRate: 10,
            repeat: -1
        });

        this.anims.create({
            key: 'turn',
            frames: [ { key: 'dude', frame: 4 } ],
            frameRate: 20
        });

        this.anims.create({
            key: 'right',
            frames: this.anims.generateFrameNumbers('dude', { start: 5, end: 8 }),
            frameRate: 10,
            repeat: -1
        });


        // collision and overlaps
        this.physics.add.collider(player, platforms);
        this.physics.add.collider(player, breakPlat1, breakPlat1Check, null, this);
        this.physics.add.collider(player, bluePlatforms);
        this.physics.add.overlap(player, goal, goalReached, null, this);
        this.physics.add.collider(player, mushroom, springUp, null, this);
        this.physics.add.overlap(player, mold, moldTouch, null, this);

        cursors = this.input.keyboard.createCursorKeys();

        // text
        levelText = this.add.text(16, 48, 'Level: 1', {fontSize: '32px', fill: '#000'})
    }

    function breakPlat1Check(){
        breakPlat1Touched = true;
        onBreakPlat = true;
    }

    function goalReached(){
        // runs once per child
       platforms.children.iterate(function(platform){
        // 1st statment: collision, 2nd statement: visual
        platform.disableBody(true, true);
       });
        level += 1;
        levelText.setText ('Level: ' + level);
        levelSetup();
        player.setPosition(300, 400);
    }

    function levelSetup(){
        // checks level for position
        switch(level){
            case 1:
                platPos.x1 = 600;
                platPos.y1 = 400;
                platPos.x2 = 50;
                platPos.y2 = 250;
                platPos.x3 = 750;
                platPos.y3 = 150;
                breakPlatPos.x1 = 277;
                breakPlatPos.y1 = 258;
                colorPlatPos.blueX1 = 300;
                colorPlatPos.blueY1 = 300;
                goalPos.x = 100;
                goalPos.y = 200;
                mushPos.x = 330;
                mushPos.y = 525;
                moldPos.x1 = 500;
                moldPos.y = 385;
                moldChainA = 5;
                break;
            case 2:
                platPos.x1 = 0;
                platPos.y1 = 475;
                platPos.x2 = 300;
                platPos.y2 = 200;
                platPos.x3 = 550;
                platPos.y3 = 350;
                goalPos.x = 325;
                goalPos.y = 50;
                break;
            case 3:

                break;
        }
        // goal
        goal.setPosition(goalPos.x, goalPos.y, 'goal');

        // mushroom spring
        mushroom.setPosition(mushPos.x, mushPos.y, 'mushroom');

        // main ground
        platforms.create(400, 568, 'ground').setScale(2).refreshBody();

        // other platforms
        platforms.create(platPos.x1, platPos.y1, 'ground');
        platforms.create(platPos.x2, platPos.y2, 'ground');
        platforms.create(platPos.x3, platPos.y3, 'ground');

        // breakaway platforms
        breakPlat1.setPosition(breakPlatPos.x1, breakPlatPos.y1, 'breakPlat');

        // color platforms
        bluePlatforms.create(colorPlatPos.blueX1, colorPlatPos.blueY1, 'colorPlat').setTint(0x0062ff);

        // mold
        let moldAtexture3 = 'mold';
        let moldAtexture4 = 'mold';
        let moldAtexture5 = 'mold';

        moldPos.x2 = (moldPos.x1 + 24);
        moldPos.x3 = (moldPos.x2 + 24);
        moldPos.x4 = (moldPos.x3 + 24);
        moldPos.x5 = (moldPos.x4 + 24);

        if (moldChainA <= 3){
            moldAtexture3 = 'moldEdge';
        } else {
            moldAtexture3 = 'mold';
        }
        if (moldChainA === 4){
            moldAtexture4 = 'moldEdge';
        } else {
            moldAtexture4 = 'mold';
        }
        if (moldChainA >= 5){
            moldAtexture5 = 'moldEdge';
        } else {
            moldAtexture5 = 'mold';
        }
        mold.create(moldPos.x1, moldPos.y, 'moldEdge').setFlipX(true);
        mold.create(moldPos.x2, moldPos.y, 'mold');
        mold.create(moldPos.x3, moldPos.y, moldAtexture3);
        rightMold = moldPos.x3;
        if (moldChainA >= 4){
        mold.create(moldPos.x4, moldPos.y, moldAtexture4);
        rightMold = moldPos.x4;
        }
        if (moldChainA >= 5){
        mold.create(moldPos.x5, moldPos.y, moldAtexture5);
        rightMold = moldPos.x5;
        }

        // refresh collison hitboxes
        breakPlat1.refreshBody();
        mushroom.refreshBody();
        goal.refreshBody();
    }

    function springUp(){
        if (player.body.touching.down && mushroom.body.touching.up){
            player.setVelocityY(-600);
            cJump = false;
        }
    }

    function moldTouch(){
        player.x = safeSpotX;
        player.y = (safeSpotY-5);
        player.setVelocityY(0);
    }

    function update(){
        if (cursors.left.isDown){
            player.setVelocityX(-160);
            player.anims.play('left', true);
        }
        else if (cursors.right.isDown){
            player.setVelocityX(160);
            player.anims.play('right', true);
        }
        else{
            player.setVelocityX(0);
            player.anims.play('turn', true);
        }

        // SAFESPOT
        // safespot only taken if player is far enough from mold edge
        if (player.body.touching.down && ((player.x <= (moldPos.x1 - 12 - 50)) || (player.x >= (rightMold + 12 + 50))) && !breakPlat1Touched){
            safeSpotX = player.x;
            safeSpotY = player.y;
        }
     
        // JUMP
        if (cursors.up.isDown && (player.body.touching.down || cJump === true)){
            player.setVelocityY(-400);
            cJump = false;
        }

        // coyote jump. If player is NOT touching down
        if (!player.body.touching.down){
            // coyote jump timer
            // "=>" go to these commands
            this.time.delayedCall(100, () => {
                cJump = false;
            })
        }

        if (player.body.touching.down){
            cJump = true;
        }

        // BREAKAWAY PLATFORMS
        if (!onBreakPlat && breakPlat1Touched && 
        (player.y <= (breakPlat1.y - breakPlat1.height/2 - 30) || (player.x >= (breakPlat1.x + breakPlat1.width/2) || (player.x <= (breakPlat1.x - breakPlat1.width/2))))){
            breakPlat1.disableBody(true,true);
            breakPlat1Touched = false;
        }
        onBreakPlat = false;

    }
    


</script>

</body>
</html>
