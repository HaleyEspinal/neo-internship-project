<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8" />
    <title>Dust Bunny Adventures</title>
    <script src="//cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>
    <style type="text/css">
        body {
            margin: 0;
        }
    </style>
</head>
<body>

<script type="text/javascript">
    var gameOver = false;
    let cJump = true;
    let airTime = 0;
    let level = 1;
    let levelText;
    let cursorText;
    let safeSpotX;
    let safeSpotY;
    let moldChainA = 3;
    let rightMold;
    let breakPlat1Touched;
    let onBreakPlat;
    let colorBlue = true;
    let blueCollider;

    // this is an object, not an array
    // example of call: platPosition.x1
    let playerPos = {
        x: 0,
        y: 0,
    }

    let platPos = {
        x1: 0,
        y1: 0,
        x2: 0,
        y2: 0,
        x3: 0,
        y3: 0,
    }

    let breakPlatPos = {
        x1: 0,
        y1: 0,
    }

    let colorPlatPos = {
        blueX1: 0,
        blueY1: 0,
    }

    let mushPos = {
        x: 0,
        y: 0,
    }

    let moldPos = {
        y: 0,
        x1: 0,
        x2: 0,
        x3: 0,
        x4: 0,
        x5: 0,
    }

    let goalPos = {
        x: 0,
        y: 0,
    }

    let leverPos = {
        x: 0,
        y: 0,
    }

    var config = {
        type: Phaser.AUTO,
        // factor of 216 for resolution 16 by 9 ratio
        width: 3456,
        height: 1944,
        backgroundColor: '0x120c06',
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 550 },
                debug: false
            }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    var game = new Phaser.Game(config);

    function preload ()
    {
        this.load.image('projRef', 'projectionRef.jpg')
        this.load.image('sky', 'assets/sky.png');
        this.load.image('ground', 'assets/platform.png');
        this.load.image('breakPlat', 'assets/breakPlat.png');
        this.load.image('colorPlat', 'assets/colorPlat.png');
        this.load.image('mushroom', 'assets/mushroom.png');
        this.load.image('mold', 'assets/mold.png');
        this.load.image('moldEdge', 'assets/moldEdge.png');
        this.load.spritesheet('bunny',
            'assets/bunny.png',
            { frameWidth: 40, frameHeight: 32 }
        );
        this.load.image('goal', 'assets/goal.png');
        this.load.spritesheet('lever', 'assets/lever.png',
            {frameWidth: 96, frameHeight: 96}
        );
    }

    function create ()
    {
        //scale to match resolution ratio
        // this.add.image(0, 0, 'projRef').setOrigin(0,0).setScale(2.16); 
        let sky = this.add.image(2018, 1532, 'sky').setDisplaySize(936, 487);
        // sky.setTint('0xffffff').setAlpha(0.5);

        // goal
        goal = this.physics.add.staticSprite(0, 0, 'goal');

        //mushroom spring
        mushroom = this.physics.add.staticSprite(0, 0, 'mushroom');

        // platforms
        platforms = this.physics.add.staticGroup();

        // breakaway platforms created
        breakPlat1 = this.physics.add.staticSprite(0, 0, 'breakPlat');

        // color platforms
        bluePlatforms = this.physics.add.staticGroup();

        // mold
        mold = this.physics.add.staticGroup();

        // lever
        lever = this.physics.add.staticSprite(0, 0, 'lever');
        lever.setDepth(1);

        player = this.physics.add.sprite(1700, 1700, 'bunny');
        player.setBounce(0.15);
        player.setCollideWorldBounds(true);
        player.setDepth(2);

        this.anims.create({
            key: 'left',
            frames: this.anims.generateFrameNumbers('bunny', { start: 0, end: 3 }),
            frameRate: 10,
            repeat: -1
        });

        this.anims.create({
            key: 'front',
            frames: [ { key: 'bunny', frame: 4 } ],
            frameRate: 20
        });

        this.anims.create({
            key: 'right',
            frames: this.anims.generateFrameNumbers('bunny', { start: 5, end: 8 }),
            frameRate: 10,
            repeat: -1
        });


        // collision and overlaps
        this.physics.add.collider(player, platforms);
        this.physics.add.collider(player, breakPlat1, breakPlat1Check, null, this);
        blueCollider = this.physics.add.collider(player, bluePlatforms);
        this.physics.add.overlap(player, goal, goalReached, null, this);
        this.physics.add.collider(player, mushroom, springUp, null, this);
        this.physics.add.overlap(player, mold, moldTouch, null, this);

        // keyboard inputs
        cursors = this.input.keyboard.createCursorKeys();
        zeroKey = this.input.keyboard.addKey('ZERO');

        // text
        testText = this.add.text(16, 20, 'Blue: ', {fontSize: '32px', fill: '#ffffff'})
        levelText = this.add.text(16, 50, 'Level: 1', {fontSize: '32px', fill: '#ffffff'})
        cursorText = this.add.text(16, 80, 'Mouse: ', {fontSize: '32px', fill: '#ffffff'})
        

        levelSetup();
    }

    function breakPlat1Check(){
        breakPlat1Touched = true;
        onBreakPlat = true;
    }

    function goalReached(){
        // runs once per child
       platforms.children.iterate(function(platform){
        // 1st statment: collision, 2nd statement: visual
            platform.disableBody(true, true);
       });
        mold.children.iterate(function(mold){
            mold.disableBody(true, true);
       });
        bluePlatforms.children.iterate(function(bluePlatforms){
            bluePlatforms.disableBody(true, true);
       });
        level += 1;
        levelText.setText ('Level: ' + level);
        levelSetup();
        safeSpotX = player.x;
        safeSpotY = player.y;

        // re-enables the breakaway platform, 0 0 is ignored because of first parameter
        breakPlat1.enableBody(false, 0, 0, true, true);
    }

    function levelSetup(){
        // checks level for position
        switch(level){
            case 1:
                playerPos.x = 1700;
                playerPos.y = 1700;
                platPos.x1 = 2286;
                platPos.y1 = 1635;
                platPos.x2 = 1640;
                platPos.y2 = 1540;
                platPos.x3 = 2210;
                platPos.y3 = 1400;
                breakPlatPos.x1 = 1868;
                breakPlatPos.y1 = 1532;
                colorPlatPos.blueX1 = 1724;
                colorPlatPos.blueY1 = 1654;
                goalPos.x = 1684;
                goalPos.y = 1443;
                mushPos.x = 1920;
                mushPos.y = 1725;
                moldPos.x1 = 2200;
                moldPos.y = 1618;
                moldChainA = 5;
                leverPos.x = 1500;
                leverPos.y = 1513;
                break;
            case 2:
                playerPos.x = 2020;
                playerPos.y = 1700;
                platPos.x1 = 1686;
                platPos.y1 = 1650;
                platPos.x2 = 2340;
                platPos.y2 = 1650;
                platPos.x3 = 2025;
                platPos.y3 = 1450;
                breakPlatPos.x1 = 2328;
                breakPlatPos.y1 = 1532;
                colorPlatPos.blueX1 = 2252;
                colorPlatPos.blueY1 = 1442;
                goalPos.x = 2025;
                goalPos.y = 1350;
                mushPos.x = 1770;
                mushPos.y = 1620;
                moldPos.x1 = 1840;
                moldPos.y = 1433;
                moldChainA = 3;
                break;
            case 3:

                break;
        }
        // move player
        player.setPosition(playerPos.x, playerPos.y);

        // goal
        goal.setPosition(goalPos.x, goalPos.y, 'goal');

        // mushroom spring
        mushroom.setPosition(mushPos.x, mushPos.y, 'mushroom');

        // main ground
        platforms.create(2018, 1756, 'ground').setDisplaySize(936, 40).refreshBody();

        // other platforms
        platforms.create(platPos.x1, platPos.y1, 'ground');
        platforms.create(platPos.x2, platPos.y2, 'ground');
        platforms.create(platPos.x3, platPos.y3, 'ground');

        // breakaway platforms
        breakPlat1.setPosition(breakPlatPos.x1, breakPlatPos.y1, 'breakPlat');

        // color platforms
        colorPlatforms();

        // mold
        let moldAtexture3 = 'mold';
        let moldAtexture4 = 'mold';
        let moldAtexture5 = 'mold';

        moldPos.x2 = (moldPos.x1 + 24);
        moldPos.x3 = (moldPos.x2 + 24);
        moldPos.x4 = (moldPos.x3 + 24);
        moldPos.x5 = (moldPos.x4 + 24);

        if (moldChainA <= 3){
            moldAtexture3 = 'moldEdge';
        } else {
            moldAtexture3 = 'mold';
        }
        if (moldChainA === 4){
            moldAtexture4 = 'moldEdge';
        } else {
            moldAtexture4 = 'mold';
        }
        if (moldChainA >= 5){
            moldAtexture5 = 'moldEdge';
        } else {
            moldAtexture5 = 'mold';
        }
        mold.create(moldPos.x1, moldPos.y, 'moldEdge').setFlipX(true);
        mold.create(moldPos.x2, moldPos.y, 'mold');
        mold.create(moldPos.x3, moldPos.y, moldAtexture3);
        rightMold = moldPos.x3;
        if (moldChainA >= 4){
        mold.create(moldPos.x4, moldPos.y, moldAtexture4);
        rightMold = moldPos.x4;
        }
        if (moldChainA >= 5){
        mold.create(moldPos.x5, moldPos.y, moldAtexture5);
        rightMold = moldPos.x5;
        }

        //EXTERNAL
        lever.setPosition(leverPos.x, leverPos.y, 'lever');

        // refresh collison hitboxes
        breakPlat1.refreshBody();
        mushroom.refreshBody();
        goal.refreshBody();
    }

    function colorPlatforms(){
        bluePlatforms.clear(true, true);
        if (colorBlue === true){
            blueCollider.active = true;
            bluePlatforms.create(colorPlatPos.blueX1, colorPlatPos.blueY1, 'colorPlat').setTint(0x0062ff);
        } else {
            blueCollider.active = false;
            bluePlatforms.create(colorPlatPos.blueX1, colorPlatPos.blueY1, 'colorPlat').setTint(0x6ea6ff);
        }
    }

    function springUp(){
        if (player.body.touching.down && mushroom.body.touching.up){
            player.setVelocityY(-600);
            cJump = false;
        }
    }

    function moldTouch(){
        player.x = safeSpotX;
        player.y = (safeSpotY-5);
        player.setVelocityY(0);
    }

    function update(){
        if (cursors.left.isDown){
            player.setVelocityX(-160);
            player.anims.play('left', true);
        }
        else if (cursors.right.isDown){
            player.setVelocityX(160);
            player.anims.play('right', true);
        }
        else{
            player.setVelocityX(0);
            player.anims.play('front', true);
        }

        // SAFESPOT
        // safespot only taken if player is far enough from mold edge
        if (player.body.touching.down && ((player.x <= (moldPos.x1 - 12 - 50)) || (player.x >= (rightMold + 12 + 50))) && !breakPlat1Touched){
            safeSpotX = player.x;
            safeSpotY = player.y;
        }
     
        // JUMP
        if (cursors.up.isDown && (player.body.touching.down || cJump === true)){
            player.setVelocityY(-400);
            cJump = false;
        }

        // coyote jump. If player is NOT touching down
        if (!player.body.touching.down){
            // coyote jump timer
            // "=>" go to these commands
            this.time.delayedCall(100, () => {
                cJump = false;
            })
        }

        if (player.body.touching.down){
            cJump = true;
        }

        // BREAKAWAY PLATFORMS
        // -30 accounts for bounce
        if (!onBreakPlat && breakPlat1Touched && 
        (player.y <= (breakPlat1.y - breakPlat1.height/2 - 30) || 
        player.y >= (breakPlat1.x + breakPlat1.width/2) ||
        player.x >= (breakPlat1.x + breakPlat1.width/2) || 
        player.x <= (breakPlat1.x - breakPlat1.width/2)
        )
        ){
            breakPlat1.disableBody(true,true);
            breakPlat1Touched = false;
        }
        onBreakPlat = false;

        // TESTS
        if (Phaser.Input.Keyboard.JustDown(zeroKey)){
            colorBlue = !colorBlue;
            colorPlatforms();
        }

        testText.setText ('Blue: ' + colorBlue);
        cursorText.setText ('Mouse: ' + this.input.activePointer.x + ', ' + this.input.activePointer.y)
    }
    


</script>

</body>
</html>
